<svg xmlns="http://www.w3.org/2000/svg" width="640" height="345"
     font-family="'Helvetica Neue', Arial, sans-serif">
  <style>
    .hdr-wb  { fill: #3a7bd5; }
    .hdr-lb  { fill: #d97706; }
    .hdr-gf  { fill: #7c3aed; }
    .hdr-txt { fill: #fff; font-size: 10px; font-weight: bold; letter-spacing: 0.6px; }
    .p-row   { fill: #fff; }
    .p-win   { fill: #dcfce7; }
    .p-lose  { fill: #fee2e2; }
    .p-tbd   { fill: #f1f5f9; }
    .p-txt   { fill: #1e293b; font-size: 11px; }
    .p-gray  { fill: #94a3b8; font-size: 11px; font-style: italic; }
    .win-chk { fill: #16a34a; font-size: 11px; }
    .wire    { fill: none; stroke: #94a3b8; stroke-width: 1.5; }
    .box     { fill: none; stroke: #cbd5e1; stroke-width: 1.5; }
    .div     { stroke: #e2e8f0; stroke-width: 1; }
    .lbl     { fill: #64748b; font-size: 10px; font-weight: bold; letter-spacing: 1px; }
  </style>

  <!-- Section labels -->
  <text x="20"  y="14"  class="lbl">WINNER'S BRACKET</text>
  <text x="20"  y="238" class="lbl">LOSER'S BRACKET</text>
  <text x="460" y="149" class="lbl">GRAND FINALS</text>

  <!-- Connector wires (drawn before boxes so boxes sit on top) -->
  <!-- WB R1 M1 → WB R2 M3 -->
  <path class="wire" d="M 180,58  H 210 V 106 H 240"/>
  <!-- WB R1 M2 → WB R2 M3 -->
  <path class="wire" d="M 180,154 H 210 V 106 H 240"/>
  <!-- WB R2 M3 → GF -->
  <path class="wire" d="M 400,106 H 430 V 195 H 460"/>
  <!-- LB R1 M1 → LB R2 M2 -->
  <path class="wire" d="M 180,284 H 240"/>
  <!-- LB R2 M2 → GF -->
  <path class="wire" d="M 400,284 H 430 V 195 H 460"/>

  <!-- ═══ WB R1 M1: #1 Alice vs #4 Dave — Alice wins ═══ -->
  <g transform="translate(20,22)">
    <rect class="hdr-wb" width="160" height="20"/>
    <rect class="p-win"  y="20" width="160" height="26"/>
    <rect class="p-lose" y="46" width="160" height="26"/>
    <rect class="box"    width="160" height="72"/>
    <line class="div" x1="0" y1="20" x2="160" y2="20"/>
    <line class="div" x1="0" y1="46" x2="160" y2="46"/>
    <text x="80" y="10" text-anchor="middle" dominant-baseline="middle" class="hdr-txt">WB · R1 · M1</text>
    <text x="8"  y="33" dominant-baseline="middle" class="p-txt">#1  Alice</text>
    <text x="8"  y="59" dominant-baseline="middle" class="p-txt">#4  Dave</text>
    <text x="152" y="33" text-anchor="end" dominant-baseline="middle" class="win-chk">✓</text>
  </g>

  <!-- ═══ WB R1 M2: #2 Bob vs #3 Carol — Bob wins ═══ -->
  <g transform="translate(20,118)">
    <rect class="hdr-wb" width="160" height="20"/>
    <rect class="p-win"  y="20" width="160" height="26"/>
    <rect class="p-lose" y="46" width="160" height="26"/>
    <rect class="box"    width="160" height="72"/>
    <line class="div" x1="0" y1="20" x2="160" y2="20"/>
    <line class="div" x1="0" y1="46" x2="160" y2="46"/>
    <text x="80" y="10" text-anchor="middle" dominant-baseline="middle" class="hdr-txt">WB · R1 · M2</text>
    <text x="8"  y="33" dominant-baseline="middle" class="p-txt">#2  Bob</text>
    <text x="8"  y="59" dominant-baseline="middle" class="p-txt">#3  Carol</text>
    <text x="152" y="33" text-anchor="end" dominant-baseline="middle" class="win-chk">✓</text>
  </g>

  <!-- ═══ WB R2 M3: #1 Alice vs #2 Bob — pending ═══ -->
  <g transform="translate(240,70)">
    <rect class="hdr-wb" width="160" height="20"/>
    <rect class="p-row"  y="20" width="160" height="26"/>
    <rect class="p-row"  y="46" width="160" height="26"/>
    <rect class="box"    width="160" height="72"/>
    <line class="div" x1="0" y1="20" x2="160" y2="20"/>
    <line class="div" x1="0" y1="46" x2="160" y2="46"/>
    <text x="80" y="10" text-anchor="middle" dominant-baseline="middle" class="hdr-txt">WB · R2 · M3</text>
    <text x="8"  y="33" dominant-baseline="middle" class="p-txt">#1  Alice</text>
    <text x="8"  y="59" dominant-baseline="middle" class="p-txt">#2  Bob</text>
  </g>

  <!-- ═══ LB R1 M1: #4 Dave vs #3 Carol — pending ═══ -->
  <g transform="translate(20,248)">
    <rect class="hdr-lb" width="160" height="20"/>
    <rect class="p-row"  y="20" width="160" height="26"/>
    <rect class="p-row"  y="46" width="160" height="26"/>
    <rect class="box"    width="160" height="72"/>
    <line class="div" x1="0" y1="20" x2="160" y2="20"/>
    <line class="div" x1="0" y1="46" x2="160" y2="46"/>
    <text x="80" y="10" text-anchor="middle" dominant-baseline="middle" class="hdr-txt">LB · R1 · M1</text>
    <text x="8"  y="33" dominant-baseline="middle" class="p-txt">#4  Dave</text>
    <text x="8"  y="59" dominant-baseline="middle" class="p-txt">#3  Carol</text>
  </g>

  <!-- ═══ LB R2 M2: TBD vs winner of LB R1 ═══ -->
  <g transform="translate(240,248)">
    <rect class="hdr-lb" width="160" height="20"/>
    <rect class="p-tbd"  y="20" width="160" height="26"/>
    <rect class="p-tbd"  y="46" width="160" height="26"/>
    <rect class="box"    width="160" height="72"/>
    <line class="div" x1="0" y1="20" x2="160" y2="20"/>
    <line class="div" x1="0" y1="46" x2="160" y2="46"/>
    <text x="80" y="10" text-anchor="middle" dominant-baseline="middle" class="hdr-txt">LB · R2 · M2</text>
    <text x="8"  y="33" dominant-baseline="middle" class="p-gray">TBD</text>
    <text x="8"  y="59" dominant-baseline="middle" class="p-gray">TBD</text>
  </g>

  <!-- ═══ Grand Finals ═══ -->
  <g transform="translate(460,159)">
    <rect class="hdr-gf" width="160" height="20"/>
    <rect class="p-tbd"  y="20" width="160" height="26"/>
    <rect class="p-tbd"  y="46" width="160" height="26"/>
    <rect class="box"    width="160" height="72"/>
    <line class="div" x1="0" y1="20" x2="160" y2="20"/>
    <line class="div" x1="0" y1="46" x2="160" y2="46"/>
    <text x="80" y="10" text-anchor="middle" dominant-baseline="middle" class="hdr-txt">GRAND FINALS</text>
    <text x="8"  y="33" dominant-baseline="middle" class="p-gray">TBD</text>
    <text x="8"  y="59" dominant-baseline="middle" class="p-gray">TBD</text>
  </g>

</svg>
